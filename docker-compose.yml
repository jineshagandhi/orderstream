services:
  mongo:
    image: mongo:7
    container_name: orderstream-mongo
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: |
        mongosh --quiet --eval "
          try {
            const s = rs.status();
            if (s.ok === 1) quit(0);
          } catch (e) {
            rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]});
            quit(0);
          }
        "
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 5s

volumes:
  mongo_data:
